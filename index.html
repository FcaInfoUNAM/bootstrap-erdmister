<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/bootstrap.css">
    <title>Laboratorio 3</title>
    <style>
        body {
            background-image: url('img/signIn.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .card-transparente {
            background-color: rgba(255, 255, 255, 0.8); 
            border: none;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <img src="img/logo.png" alt="FCA" height="40" class="d-inline-block align-text-top me-3">
                Informática
            </a>
        </div>
    </nav>

    <main>
        <div class="d-flex justify-content-md-center align-items-center min-vh-100 py-4">
            <div class="card p-4 card-transparente" style="width: 30rem;">
                <div class="card-body">
                    <h5 class="card-title">Welcome</h5>
                    
                    <div class="alert alert-info" role="alert">
                        Por favor, llena todos los datos para registrarte.
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="email" placeholder="name@example.com">
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password">
                    </div>

                    <!-- Repeat password corregido a type="password" -->
                    <div class="mb-3">
                        <label for="passwordRepeat" class="form-label">Repeat password</label>
                        <input type="password" class="form-control" id="passwordRepeat">
                    </div>

                    <div class="mb-3">
                        <label for="userName" class="form-label">Usuario</label>
                        <input type="text" class="form-control" id="userName" placeholder="elBarto666">
                    </div>

                    <div class="mb-3">
                        <label for="phone" class="form-label">Phone</label>
                        <input type="tel" class="form-control" id="phone" placeholder="5510101010">
                    </div>

                    <div class="mb-3">
                        <label for="userType" class="form-label">User Type</label>
                        <select class="form-select" aria-label="Tipo_de_usuario" id="userType">
                            <option selected disabled>Seleccioanr</option>
                            <option value="1">Alumno</option>
                            <option value="2">Profesor</option>
                            <option value="3">Epleado</option>
                        </select>
                    </div>

                    <!-- Botón con texto "Sing Up" y color oscuro (coincide con el navbar) -->
                    <div>
                        <button class="btn btn-dark" type="submit">Sing Up</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/bootstrap.js"></script>
</body>
</html>
